<!--
Purpose: Single-page Flask form and result view for water quality assessment.
Author: <author>
Date: <date>
-->
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Water Quality Assessment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page-shell">
        <section class="assessment-panel">
            <header class="page-header">
                <p class="eyebrow">Mamdani Fuzzy Inference System</p>
                <h1>Surface Water Quality Assessment</h1>
            </header>

            {% if error %}
                <div class="alert">{{ error }}</div>
            {% endif %}

            <form method="post" class="input-grid">
                {% for field in fields %}
                    <label class="field">
                        <span>{{ field.label }}{% if field.unit %} ({{ field.unit }}){% endif %}</span>
                        <input
                            type="number"
                            name="{{ field.name }}"
                            min="{{ field.min }}"
                            max="{{ field.max }}"
                            step="any"
                            value="{{ values.get(field.name, '') }}"
                            required
                        >
                        <small>{{ field.hint }}</small>
                    </label>
                {% endfor %}

                <button type="submit">Assess Water Quality</button>
            </form>
        </section>

        {% if result %}
            <section class="result-panel">
                <div class="result-summary">
                    <div>
                        <p class="eyebrow">Water Quality Index</p>
                        <p class="score">{{ "%.2f"|format(result.score) }}</p>
                    </div>
                    <div class="label-block">
                        <p class="quality-label">{{ result.label }}</p>
                        <span class="badge {{ result.badge_class }}">{{ result.label }}</span>
                    </div>
                </div>

                <p class="interpretation">{{ result.interpretation }}</p>
                <img
                    class="output-plot"
                    src="{{ result.plot_url }}"
                    alt="Output membership function plot showing the computed score"
                >
            </section>
        {% endif %}
    </main>
</body>
</html>
